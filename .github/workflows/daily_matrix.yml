name: CATALYST — Stock Catalyst Intelligence

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Run specific ticker(s), comma-separated (leave empty for all). Example: ASML,PLTR'
        required: false
        default: ''
        type: string

  schedule:
    - cron: '0 12 * * 1-5'  # Monday-Friday at 12:00 UTC

permissions:
  contents: write

jobs:
  run-catalyst:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run CATALYST Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          TICKER="${{ github.event.inputs.ticker }}"
          if [ -n "$TICKER" ]; then
            echo "Running for: $TICKER"
            python backend/macro_agent.py --ticker "$TICKER"
          else
            echo "Running full scan"
            python backend/macro_agent.py
          fi

      - name: Commit updated data
        run: |
          git config user.name "CATALYST Bot"
          git config user.email "bot@catalyst.local"
          git add docs/master_data.json docs/history/
          TICKER="${{ github.event.inputs.ticker }}"
          MSG="CATALYST update"
          if [ -n "$TICKER" ]; then
            MSG="CATALYST — $TICKER"
          fi
          git diff --staged --quiet || git commit -m "$MSG — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main || true
          git push
