<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#08090c">
    <title>CATALYST</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08090c; --bg2: #0f1117; --bg3: #161821; --bg4: #1c1e2a;
            --border: #232538; --border-h: #00d4ff;
            --accent: #00d4ff; --accent-dim: #0099bb; --accent-glow: rgba(0,212,255,0.12);
            --txt: #e4e6ef; --txt2: #9498b3; --txt3: #565a75;
            --green: #2dd4a8; --red: #f0506e; --amber: #f5a623; --purple: #8b7cf6;
            --mono: 'SF Mono','JetBrains Mono','Fira Code',monospace;
            --r: 12px; --r2: 16px;
            --safe-b: env(safe-area-inset-bottom, 0px);
            --sidebar-w: 260px;
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);overscroll-behavior:none}

        /* ── Login ── */
        .login{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
        .login.hide{display:none}
        .login-box{width:360px;max-width:90vw;text-align:center}
        .login-logo{font-size:42px;font-weight:900;letter-spacing:6px;margin-bottom:4px;background:linear-gradient(135deg,var(--accent),#6366f1,var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .login-sub{font-size:10px;color:var(--txt3);letter-spacing:6px;text-transform:uppercase;margin-bottom:40px}
        .pin-row{display:flex;gap:10px;justify-content:center;margin-bottom:28px;direction:ltr}
        .pin-row input{width:46px;height:56px;background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;color:var(--txt);font-family:var(--mono);font-size:22px;font-weight:700;text-align:center;outline:none;transition:.2s;-webkit-text-security:disc}
        .pin-row input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-glow)}
        .pin-row input.err{border-color:var(--red);animation:shake .4s}
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
        .login-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent),#6366f1);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:.2s}
        .login-btn:hover{opacity:.9;transform:translateY(-1px)}
        .login-msg{color:var(--red);font-size:12px;margin-top:14px;min-height:18px}
        .login-msg.lock{color:var(--amber)}
        .login-label{font-size:12px;color:var(--txt2);margin-bottom:14px}

        /* ── App Shell ── */
        .app{display:none;flex-direction:column;height:100dvh;height:100vh}
        .app.on{display:flex}

        /* ── Top Bar ── */
        .topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;gap:10px;min-height:54px;position:relative;z-index:50}
        .topbar-logo{font-size:20px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,var(--accent),#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:pointer}
        .topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
        .badge{padding:4px 12px;border-radius:20px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
        .badge.open{background:rgba(45,212,168,.1);color:var(--green);border:1px solid rgba(45,212,168,.2)}
        .badge.closed{background:rgba(240,80,110,.1);color:var(--red);border:1px solid rgba(240,80,110,.2)}
        .badge.pre_market{background:rgba(245,166,35,.1);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
        .badge.after_hours{background:rgba(139,124,246,.1);color:var(--purple);border:1px solid rgba(139,124,246,.2)}
        .badge.weekend{background:rgba(90,90,114,.1);color:var(--txt3);border:1px solid rgba(90,90,114,.2)}
        .btn-icon{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--txt2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s}
        .btn-icon:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
        .btn-s{background:transparent;color:var(--accent);border:1px solid rgba(0,212,255,.4);padding:6px 14px;border-radius:8px;cursor:pointer;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;transition:.2s}
        .btn-s:hover{background:var(--accent);color:#000}
        .btn-s.running{background:var(--amber);border-color:var(--amber);color:#000;animation:pulse 1.5s ease infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
        .btn-ghost{background:none;border:1px solid var(--border);color:var(--txt3);padding:5px 10px;border-radius:8px;cursor:pointer;font-size:10px;white-space:nowrap;transition:.2s}
        .btn-ghost:hover{border-color:var(--red);color:var(--red)}

        /* ── Info Bar ── */
        .infobar{display:none;padding:5px 20px;background:var(--bg);border-bottom:1px solid var(--border);font-size:11px;color:var(--txt3);flex-shrink:0;gap:10px;align-items:center;flex-wrap:wrap}
        .infobar.on{display:flex}
        .infobar select{background:var(--bg3);border:1px solid var(--border);color:var(--txt);padding:4px 8px;border-radius:6px;font-size:11px;font-family:var(--mono);cursor:pointer;outline:none}
        .arch-badge{color:var(--amber);font-weight:700;display:none;font-size:10px}
        .arch-badge.on{display:inline}
        .info-spacer{flex:1}

        /* ── Main Layout ── */
        .main-layout{flex:1;display:flex;overflow:hidden;position:relative}

        /* ── Sidebar ── */
        .sidebar{width:var(--sidebar-w);background:var(--bg2);border-left:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;overflow:hidden}
        .sidebar-header{padding:12px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
        .sidebar-title{font-size:11px;font-weight:700;color:var(--txt3);letter-spacing:1px;text-transform:uppercase}
        .sidebar-add{width:26px;height:26px;border-radius:7px;border:1px dashed var(--border);background:transparent;color:var(--txt3);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:.2s}
        .sidebar-add:hover{border-color:var(--accent);color:var(--accent)}
        .sidebar-list{flex:1;overflow-y:auto;padding:6px 0;scrollbar-width:thin}
        .sidebar-list::-webkit-scrollbar{width:3px}
        .sidebar-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
        .cat-nav{padding:9px 14px;cursor:pointer;display:flex;align-items:center;gap:9px;transition:.15s;border-right:3px solid transparent;position:relative}
        .cat-nav:hover{background:var(--bg3)}
        .cat-nav.active{background:var(--accent-glow);border-right-color:var(--accent)}
        .cat-nav-icon{font-size:15px;flex-shrink:0;width:22px;text-align:center}
        .cat-nav-info{flex:1;min-width:0}
        .cat-nav-name{font-size:12px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .cat-nav.active .cat-nav-name{color:var(--accent)}
        .cat-nav-count{font-size:10px;color:var(--txt3);font-family:var(--mono)}
        .cat-nav-actions{display:none;gap:4px;align-items:center}
        .cat-nav:hover .cat-nav-actions{display:flex}
        .cat-nav-btn{width:20px;height:20px;border-radius:5px;border:none;background:transparent;color:var(--txt3);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center}
        .cat-nav-btn:hover{background:var(--bg4);color:var(--txt)}
        .cat-nav-btn.del:hover{color:var(--red)}

        /* ── Content Area ── */
        .content-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
        .content-area::-webkit-scrollbar{width:4px}
        .content-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
        .loading{text-align:center;color:var(--txt3);padding:60px 20px}
        .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* ── Category View ── */
        .cat-header{padding:18px 24px 10px;display:flex;align-items:center;justify-content:space-between;gap:12px}
        .cat-header-title{font-size:20px;font-weight:900;display:flex;align-items:center;gap:10px}
        .cat-header-icon{font-size:22px}
        .cat-header-count{font-size:12px;color:var(--txt3);font-family:var(--mono)}
        .filter-bar{display:flex;gap:6px;padding:6px 24px 14px;overflow-x:auto;scrollbar-width:none}
        .filter-bar::-webkit-scrollbar{display:none}
        .fbtn{padding:5px 13px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--txt3);white-space:nowrap;transition:.2s}
        .fbtn.active{background:var(--accent-glow);border-color:var(--accent);color:var(--accent)}
        .fbtn:hover{border-color:var(--accent-dim)}
        .stock-grid{padding:0 24px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;max-width:1200px}

        /* ── Stock Card ── */
        .card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:.25s;position:relative;overflow:hidden}
        .card:hover{border-color:rgba(0,212,255,.3);background:var(--bg3);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
        .card::before{content:'';position:absolute;top:0;right:0;left:0;height:3px}
        .card.bullish::before{background:linear-gradient(90deg,var(--green),rgba(45,212,168,.1))}
        .card.bearish::before{background:linear-gradient(90deg,var(--red),rgba(240,80,110,.1))}
        .card.neutral::before{background:linear-gradient(90deg,var(--purple),rgba(139,124,246,.1))}
        .card-row1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
        .card-left{display:flex;align-items:center;gap:10px}
        .card-ticker{font-size:17px;font-weight:900;font-family:var(--mono);letter-spacing:1px}
        .card-price{font-family:var(--mono);font-size:12px;color:var(--txt2)}
        .card-change{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;font-family:var(--mono)}
        .card-change.up{background:rgba(45,212,168,.1);color:var(--green)}
        .card-change.down{background:rgba(240,80,110,.1);color:var(--red)}
        .card-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
        .card-conf{min-width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:15px;font-weight:900}
        .card-conf.hi{background:rgba(45,212,168,.1);color:var(--green);border:1px solid rgba(45,212,168,.2)}
        .card-conf.mid{background:rgba(245,166,35,.1);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
        .card-conf.lo{background:rgba(240,80,110,.1);color:var(--red);border:1px solid rgba(240,80,110,.2)}
        .card-row2{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
        .card-signal{display:inline-block;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700}
        .card-signal.bullish{background:rgba(45,212,168,.08);border:1px solid rgba(45,212,168,.25);color:var(--green)}
        .card-signal.bearish{background:rgba(240,80,110,.08);border:1px solid rgba(240,80,110,.25);color:var(--red)}
        .card-signal.neutral{background:rgba(139,124,246,.08);border:1px solid rgba(139,124,246,.25);color:var(--purple)}
        .card-co{font-size:10px;color:var(--txt3)}
        .card-bottom{font-size:11.5px;line-height:1.6;color:var(--txt2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .card-badges{display:flex;gap:4px;align-items:center;margin-right:auto}
        .card-badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:9px;font-weight:700}
        .card-badge.short{background:rgba(245,166,35,.1);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
        .card-badge.long{background:rgba(139,124,246,.1);color:var(--purple);border:1px solid rgba(139,124,246,.2)}
        .card-cat-assign{position:absolute;top:8px;left:8px;opacity:0;transition:.2s}
        .card:hover .card-cat-assign{opacity:1}
        .card-cat-btn{width:24px;height:24px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--txt3);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:.15s}
        .card-cat-btn:hover{border-color:var(--purple);color:var(--purple);background:rgba(139,124,246,.1)}
        .empty-state{text-align:center;padding:50px 20px;color:var(--txt3)}

        /* ── Ticker Detail Page ── */
        .ticker-page{display:none}
        .ticker-page.on{display:block}
        .tp-header{padding:20px 24px;background:var(--bg2);border-bottom:1px solid var(--border)}
        .tp-back{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--txt3);cursor:pointer;border:none;background:none;margin-bottom:14px;padding:5px 10px;border-radius:8px;transition:.15s}
        .tp-back:hover{background:var(--bg3);color:var(--accent)}
        .tp-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
        .tp-info{flex:1}
        .tp-ticker{font-size:30px;font-weight:900;font-family:var(--mono);letter-spacing:3px;background:linear-gradient(135deg,var(--accent),#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .tp-name{font-size:13px;color:var(--txt2);margin-top:4px}
        .tp-price-row{display:flex;align-items:center;gap:12px;margin-top:8px}
        .tp-price{font-family:var(--mono);font-size:20px;font-weight:700}
        .tp-change{font-size:13px;font-weight:700;padding:4px 10px;border-radius:8px;font-family:var(--mono)}
        .tp-change.up{background:rgba(45,212,168,.1);color:var(--green)}
        .tp-change.down{background:rgba(240,80,110,.1);color:var(--red)}
        .tp-actions{display:flex;gap:8px}
        .tp-remove{padding:7px 14px;border-radius:8px;border:1px solid var(--red);background:none;color:var(--red);cursor:pointer;font-size:11px;font-weight:600;transition:.15s}
        .tp-remove:hover{background:rgba(240,80,110,.1)}

        /* ── Analysis Tabs ── */
        .tp-tabs{display:flex;gap:0;padding:0 24px;background:var(--bg2);border-bottom:1px solid var(--border)}
        .tp-tab{padding:12px 22px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:none;color:var(--txt3);border-bottom:3px solid transparent;transition:.2s;letter-spacing:.5px}
        .tp-tab:hover{color:var(--txt)}
        .tp-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
        .tp-tab-icon{margin-left:6px}

        .tp-body{padding:20px 24px 40px;max-width:780px}
        .tp-empty{text-align:center;padding:40px 20px;color:var(--txt3)}
        .tp-scan-btn{padding:11px 24px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--accent),#6366f1);border:none;color:#fff;letter-spacing:1px;transition:.2s}
        .tp-scan-btn:hover{opacity:.85;transform:translateY(-1px)}
        .tp-scan-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
        .tp-scan-btn.running{background:var(--amber);animation:pulse 1.5s ease infinite}

        /* ── Analysis Content ── */
        .tp-signal{display:inline-block;padding:5px 16px;border-radius:10px;font-size:13px;font-weight:700;margin-bottom:12px}
        .tp-signal.bullish{background:rgba(45,212,168,.1);border:1.5px solid rgba(45,212,168,.3);color:var(--green)}
        .tp-signal.bearish{background:rgba(240,80,110,.1);border:1.5px solid rgba(240,80,110,.3);color:var(--red)}
        .tp-signal.neutral{background:rgba(139,124,246,.1);border:1.5px solid rgba(139,124,246,.3);color:var(--purple)}
        .tp-conf{font-size:11px;color:var(--txt3);margin-bottom:14px}
        .tp-conf strong{font-size:22px;font-weight:900;font-family:var(--mono)}
        .tp-conf strong.hi{color:var(--green)}.tp-conf strong.mid{color:var(--amber)}.tp-conf strong.lo{color:var(--red)}
        .tp-bl{font-size:13.5px;line-height:1.7;color:var(--txt);padding:12px 14px;background:rgba(0,212,255,.04);border-radius:var(--r);border-right:3px solid var(--accent);margin-bottom:18px;font-weight:500}
        .tp-sec{margin-bottom:12px;padding:14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r)}
        .tp-sec-t{font-size:11px;font-weight:700;margin-bottom:8px;color:var(--accent);letter-spacing:1px;text-transform:uppercase}
        .tp-sec-b{font-size:12.5px;color:var(--txt2);line-height:1.75}
        .cat-item{padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;position:relative;overflow:hidden}
        .cat-item::before{content:'';position:absolute;top:0;right:0;width:3px;height:100%;border-radius:0 var(--r) var(--r) 0}
        .cat-item.pos::before{background:var(--green)}.cat-item.neg::before{background:var(--red)}.cat-item.unk::before{background:var(--amber)}
        .cat-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
        .cat-title{font-size:12px;font-weight:700;color:var(--txt)}
        .cat-type{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
        .cat-type.earnings{background:rgba(0,212,255,.1);color:var(--accent)}
        .cat-type.regulatory{background:rgba(240,80,110,.1);color:var(--red)}
        .cat-type.macro{background:rgba(245,166,35,.1);color:var(--amber)}
        .cat-type.business{background:rgba(45,212,168,.1);color:var(--green)}
        .cat-type.sector{background:rgba(139,124,246,.1);color:var(--purple)}
        .cat-type.technical{background:rgba(0,212,255,.08);color:#5eead4;border:1px solid rgba(0,212,255,.2)}
        .cat-type.squeeze{background:rgba(240,80,110,.08);color:#fda4af;border:1px solid rgba(240,80,110,.2)}
        .cat-desc{font-size:11.5px;color:var(--txt2);line-height:1.6}
        .cat-tf{font-size:10px;color:var(--txt3);margin-top:4px}
        .qa{padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:.15s}
        .qa:hover{background:var(--bg4)}
        .qa-q{font-size:12.5px;font-weight:700;color:var(--txt);margin-bottom:6px}
        .qa-a{font-size:12px;color:var(--txt2);line-height:1.65;display:none}
        .qa.open .qa-a{display:block}
        .qa-imp{display:inline-block;font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600;margin-top:6px}
        .qa-imp.pos{background:rgba(45,212,168,.1);color:var(--green)}
        .qa-imp.neg{background:rgba(240,80,110,.1);color:var(--red)}
        .qa-imp.neut{background:rgba(139,124,246,.1);color:var(--purple)}
        .buzz-alert{margin-bottom:12px;padding:14px;background:rgba(245,166,35,.06);border:1.5px solid rgba(245,166,35,.25);border-radius:var(--r);display:flex;gap:10px;align-items:flex-start}
        .buzz-alert-icon{font-size:18px;flex-shrink:0}
        .buzz-alert-content{flex:1}
        .buzz-alert-t{font-size:11px;font-weight:700;color:var(--amber);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
        .buzz-alert-b{font-size:12.5px;color:var(--txt);line-height:1.6}
        .tp-sources{margin-bottom:12px;padding:14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r)}
        .tp-sources-t{font-size:11px;font-weight:700;margin-bottom:8px;color:var(--accent);letter-spacing:1px;text-transform:uppercase}
        .tp-sources-list{list-style:none;padding:0;margin:0}
        .tp-sources-list li{font-size:11.5px;color:var(--txt2);line-height:1.8;padding:4px 0;border-bottom:1px solid rgba(35,37,56,.5)}
        .tp-sources-list li:last-child{border-bottom:none}
        .tp-sources-list a{color:var(--accent);text-decoration:none}
        .tp-sources-list a:hover{text-decoration:underline;color:#fff}

        /* ── Autocomplete ── */
        .ac-wrap{position:relative}
        .ac-list{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--accent-dim);border-top:none;border-radius:0 0 10px 10px;max-height:200px;overflow-y:auto;z-index:10;display:none;scrollbar-width:thin}
        .ac-list.on{display:block}
        .ac-item{padding:9px 12px;font-size:11px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);direction:ltr;text-align:left;transition:.1s}
        .ac-item:last-child{border-bottom:none}
        .ac-item:hover,.ac-item.sel{background:var(--accent-glow)}
        .ac-sym{font-family:var(--mono);font-weight:700;color:var(--accent);font-size:12px}
        .ac-name{color:var(--txt2);font-size:10px;text-align:right;direction:rtl;max-width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

        /* ── Modals ── */
        .modal{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:400;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);padding:20px}

        .modal-box h3{font-size:16px;margin-bottom:6px;color:var(--accent)}
        .modal-box p{font-size:11px;color:var(--txt3);margin-bottom:14px}
        .m-section{margin-bottom:18px}
        .m-section-title{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}

        .m-analysis-opt{padding:12px;border:1.5px solid var(--border);border-radius:10px;background:transparent;color:var(--txt3);cursor:pointer;font-size:11px;font-weight:600;transition:.2s;text-align:right}
        .m-analysis-opt:hover{border-color:var(--accent-dim);color:var(--txt)}
        .m-analysis-opt.active{background:var(--accent-glow);border-color:var(--accent);color:var(--accent)}
        .m-analysis-desc{font-size:9px;color:var(--txt3);margin-top:4px;line-height:1.5}
        .m-market-selector{display:flex;gap:8px;margin-bottom:14px}
        .m-market-btn{flex:1;padding:10px;border:1.5px solid var(--border);border-radius:10px;background:transparent;color:var(--txt3);cursor:pointer;font-size:11px;font-weight:700;transition:.2s}
        .m-market-btn:hover{border-color:var(--accent-dim);color:var(--txt)}
        .m-market-btn.active{background:var(--accent-glow);border-color:var(--accent);color:var(--accent)}
        .m-input-group{margin-bottom:12px;text-align:right}
        .m-input-group label{display:block;font-size:10px;color:var(--txt3);margin-bottom:6px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
        .m-input-group input{width:100%;padding:10px 14px;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;color:var(--txt);font-size:12px;outline:none;font-family:inherit;text-align:right;transition:.2s}
        .m-input-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
        .m-pin{display:flex;gap:6px;justify-content:center;margin-bottom:16px;direction:ltr}
        .m-pin input{width:40px;height:46px;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;color:var(--txt);font-family:var(--mono);font-size:17px;font-weight:700;text-align:center;outline:none;-webkit-text-security:disc}
        .m-pin input:focus{border-color:var(--accent)}
        .m-acts{display:flex;gap:8px}
        .m-acts button{flex:1;padding:11px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
        .m-cancel{background:none;border:1px solid var(--border);color:var(--txt3)}
        .m-cancel:hover{border-color:var(--txt2);color:var(--txt2)}
        .m-confirm{background:linear-gradient(135deg,var(--accent),#6366f1);border:none;color:#fff}
        .m-confirm:hover{opacity:.9}
        .m-err{color:var(--red);font-size:10px;margin-top:8px;min-height:14px}

        /* ── Category Assign Dropdown ── */
        .cat-assign-drop{position:fixed;z-index:500;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:6px 0;min-width:190px;box-shadow:0 12px 32px rgba(0,0,0,.5);display:none;max-height:300px;overflow-y:auto}
        .cat-assign-drop.on{display:block}
        .cad-item{padding:8px 12px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:.1s}
        .cad-item:hover{background:var(--bg3)}
        .cad-item.active{color:var(--accent)}
        .cad-check{width:15px;height:15px;border:1.5px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
        .cad-check.on{background:var(--accent);border-color:var(--accent);color:#000}
        .cad-sep{height:1px;background:var(--border);margin:4px 0}

        /* ── Icon Picker ── */
        .cat-icon-opt{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg3);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:.15s}
        .cat-icon-opt:hover{border-color:var(--accent-dim)}
        .cat-icon-opt.active{border-color:var(--accent);background:var(--accent-glow);box-shadow:0 0 0 3px var(--accent-glow)}

        /* ── Footer ── */
        .footer{text-align:center;padding:5px;font-size:9px;color:var(--txt3);border-top:1px solid var(--border);flex-shrink:0;letter-spacing:1px;display:none;padding-bottom:calc(5px + var(--safe-b))}

        /* ── Mobile ── */
        @media(max-width:768px){
            .sidebar{display:none}
            .sidebar.mobile-on{display:flex;position:fixed;top:54px;right:0;bottom:0;z-index:90;width:270px;box-shadow:-4px 0 24px rgba(0,0,0,.4)}
            .mobile-overlay{position:fixed;inset:0;top:54px;background:rgba(0,0,0,.6);z-index:89;display:none}
            .mobile-overlay.on{display:block}

            .mobile-overlay{display:none!important}
        }
        @media(min-width:1200px){
            .stock-grid{grid-template-columns:repeat(3,1fr)}
        }
    </style>
</head>

<script>
let HASH="",S_HRS=24,MAX_ATT=5,LOCK_MIN=15,att=0,lockUntil=0;
const WATCHLIST=["ASML","PLTR","MELI","URNM","FCX","ISRG","PWR","XYL","STNG","SMH","LNG","SOXX","QQQ","SPY","MU"];
let DATA=null,currentFilter="all",selectedAnalysisType="short",selectedMarket="US";
let currentCategory="__all__",currentTickerPage=null,currentTickerTab="short",editingCategoryId=null;

const DEFAULT_CATEGORIES=[
    {id:"tech",name:"טכנולוגיה",icon:"💻",tickers:["AAPL","MSFT","GOOGL","META","NVDA","AMD","INTC","ORCL","CRM","ADBE","NOW","PLTR","ARM","SMCI","DELL","ASML","TSM","MU","AVGO","SNOW","DDOG","NET","MDB","SHOP"]},
    {id:"finance",name:"פיננסים",icon:"🏦",tickers:["JPM","V","MA","BAC","GS","MS","C","XLF","COIN"]},
    {id:"energy",name:"אנרגיה",icon:"⚡",tickers:["XOM","CVX","COP","SLB","NEE","LNG","STNG","XLE","URNM"]},
    {id:"health",name:"בריאות",icon:"🏥",tickers:["JNJ","UNH","PFE","BMY","GILD","AMGN","BIIB","MRNA","REGN","LLY","MRK","ABBV","ISRG","TMO","XLV"]},
    {id:"defense",name:"ביטחון",icon:"🛡",tickers:["RTX","LMT","NOC","BA","ESLT"]},
    {id:"cyber",name:"סייבר",icon:"🔒",tickers:["PANW","CRWD","ZS","CHKP","CYBR"]},
    {id:"israel",name:"ישראל",icon:"🇮🇱",tickers:["TEVA","ICL","NICE","CHKP","MNDY","CYBR","WIX","FVRR","GLBE","SEDG","ENLT","ESLT","SILC","KRNT","RDWR","BEZQ","PTNR","CEL"]},
    {id:"etf",name:"תעודות סל",icon:"📊",tickers:["SMH","SOXX","QQQ","SPY","VOO","VTI","IWM","DIA","ARKK","XLF","XLE","XLK","XLV","GLD","SLV","TLT","URNM"]},
];

function getCategories(){try{const s=localStorage.getItem("catalyst_categories");if(s)return JSON.parse(s)}catch(e){}return JSON.parse(JSON.stringify(DEFAULT_CATEGORIES))}
function saveCategories(c){localStorage.setItem("catalyst_categories",JSON.stringify(c))}
function getTickerAssignments(){try{const s=localStorage.getItem("catalyst_ticker_assign");return s?JSON.parse(s):{}}catch{return{}}}
function saveTickerAssignment(t,c){const a=getTickerAssignments();if(c)a[t]=c;else delete a[t];localStorage.setItem("catalyst_ticker_assign",JSON.stringify(a))}
function getTickerCategory(ticker){const a=getTickerAssignments();if(a[ticker])return a[ticker];const cats=getCategories();for(const c of cats){if(c.tickers&&c.tickers.includes(ticker))return c.id}return null}
function getCategoryTickers(catId){const cats=getCategories();const cat=cats.find(c=>c.id===catId);const base=cat&&cat.tickers?[...cat.tickers]:[];const a=getTickerAssignments();for(const[t,cid]of Object.entries(a)){if(cid===catId&&!base.includes(t))base.push(t);if(cid!==catId){const i=base.indexOf(t);if(i>-1)base.splice(i,1)}}return base}

(async()=>{try{const r=await fetch("config.json?v="+Date.now());const c=await r.json();HASH=c.auth.pin_hash;MAX_ATT=c.auth.max_attempts||5;LOCK_MIN=c.auth.lockout_minutes||15;S_HRS=c.auth.session_hours||24}catch(e){console.error("Config:",e)}})();

async function sha256(m){const d=new TextEncoder().encode(m);const h=await crypto.subtle.digest("SHA-256",d);return[...new Uint8Array(h)].map(b=>b.toString(16).padStart(2,"0")).join("")}
(function(){const s=getSess();if(s&&s.exp>Date.now())showApp();else{document.getElementById("login").classList.remove("hide");initPins("pin-box")}})();
function getSess(){try{const r=sessionStorage.getItem("cats");return r?JSON.parse(r):null}catch{return null}}
function setSess(){sessionStorage.setItem("cats",JSON.stringify({ts:Date.now(),exp:Date.now()+(S_HRS*36e5)}))}

function initPins(id){
    const box=document.getElementById(id);const ins=[...box.querySelectorAll("input")];
    ins.forEach((inp,i)=>{
        inp.addEventListener("input",function(){this.value=this.value.replace(/\D/g,"");if(this.value&&i<ins.length-1)ins[i+1].focus();if(i===ins.length-1&&this.value){if(id==="pin-box")tryLogin();else confirmRun()}});
        inp.addEventListener("keydown",function(e){if(e.key==="Backspace"&&!this.value&&i>0){ins[i-1].focus();ins[i-1].value=""}if(e.key==="Enter"){if(id==="pin-box")tryLogin();else confirmRun()}if(e.key==="Escape"&&id==="m-pin")closeRunModal()});
        inp.addEventListener("paste",function(e){e.preventDefault();const p=(e.clipboardData||window.clipboardData).getData("text").replace(/\D/g,"");for(let j=0;j<Math.min(p.length,ins.length);j++)ins[j].value=p[j];if(p.length>=ins.length){ins[ins.length-1].focus();if(id==="pin-box")tryLogin();else confirmRun()}});
    });ins[0].focus();
}

async function tryLogin(){
    const now=Date.now();if(now<lockUntil){document.getElementById("login-msg").innerHTML='<span class="lock">נעילה. נסה בעוד '+Math.ceil((lockUntil-now)/6e4)+' דקות</span>';return}
    const ins=[...document.querySelectorAll("#pin-box input")];let pin="";ins.forEach(i=>pin+=i.value);
    if(pin.length!==6){document.getElementById("login-msg").textContent="הזן 6 ספרות";return}
    const h=await sha256(pin);
    if(h===HASH){setSess();showApp()}
    else{att++;if(att>=MAX_ATT){lockUntil=Date.now()+(LOCK_MIN*6e4);document.getElementById("login-msg").innerHTML='<span class="lock">נעילה ל-'+LOCK_MIN+' דקות</span>';att=0}else{document.getElementById("login-msg").textContent="קוד שגוי ("+(MAX_ATT-att)+" נותרו)"}
    ins.forEach(i=>{i.value="";i.classList.add("err")});setTimeout(()=>ins.forEach(i=>i.classList.remove("err")),500);ins[0].focus()}
}
function showApp(){document.getElementById("login").classList.add("hide");document.getElementById("app").classList.add("on");loadCustomTickers();loadData();renderSidebar()}
function logout(){sessionStorage.removeItem("cats");location.reload()}
function loadCustomTickers(){try{const ct=localStorage.getItem("custom_tickers");if(ct){const custom=JSON.parse(ct);WATCHLIST.push(...custom.map(c=>c.symbol))}}catch(e){}}
function getCustomTickers(){try{const ct=localStorage.getItem("custom_tickers");return ct?JSON.parse(ct):[]}catch{return[]}}

    try{const r=await fetch("master_data.json?v="+Date.now());if(!r.ok)throw new Error(r.status);DATA=await r.json();renderSidebar();render();loadHistIndex()}
    catch(e){document.getElementById("loading").innerHTML='<div style="color:var(--red)">שגיאה בטעינת נתונים</div><div style="margin-top:8px;font-size:11px;color:var(--txt3)">'+e.message+'</div>'}
}
async function loadHistIndex(){try{const r=await fetch("history/index.json?v="+Date.now());if(!r.ok)return;const idx=await r.json();if(idx.length>0){const sel=document.getElementById("hist-sel");idx.forEach(e=>{const o=document.createElement("option");o.value=e.file;o.textContent=e.date;sel.appendChild(o)});document.getElementById("infobar").classList.add("on")}}catch(e){}}
async function loadHistory(f){if(!f){document.getElementById("arch-badge").classList.remove("on");try{const r=await fetch("master_data.json?v="+Date.now());DATA=await r.json();render()}catch(e){}return}try{const r=await fetch(f+"?v="+Date.now());if(!r.ok)throw 0;DATA=await r.json();document.getElementById("arch-badge").classList.add("on");render()}catch(e){alert("שגיאה בטעינת ארכיון")}}

// ── Sidebar ──
function renderSidebar(){
    const list=document.getElementById("sidebar-list");list.innerHTML="";
    const cats=getCategories();const stocks=DATA?DATA.stocks||[]:[];

    // All
    const allEl=document.createElement("div");allEl.className="cat-nav"+(currentCategory==="__all__"?" active":"");
    allEl.onclick=()=>{currentCategory="__all__";renderSidebar();goHome()};
    allEl.innerHTML=`<span class="cat-nav-icon">📋</span><div class="cat-nav-info"><div class="cat-nav-name">כל המניות</div><div class="cat-nav-count">${stocks.length}</div></div>`;
    list.appendChild(allEl);

    cats.forEach(cat=>{
        const catTickers=getCategoryTickers(cat.id);const count=stocks.filter(s=>catTickers.includes(s.ticker)).length;
        const el=document.createElement("div");el.className="cat-nav"+(currentCategory===cat.id?" active":"");
        el.onclick=(e)=>{if(e.target.closest(".cat-nav-btn"))return;currentCategory=cat.id;currentTickerPage=null;renderSidebar();render();closeSidebar()};
        el.innerHTML=`<span class="cat-nav-icon">${cat.icon||"📊"}</span><div class="cat-nav-info"><div class="cat-nav-name">${cat.name}</div><div class="cat-nav-count">${count}</div></div><div class="cat-nav-actions"><button class="cat-nav-btn" onclick="editCategory('${cat.id}')">✏️</button><button class="cat-nav-btn del" onclick="deleteCategory('${cat.id}')">🗑</button></div>`;
        list.appendChild(el);
    });

    const uncatCount=stocks.filter(s=>!getTickerCategory(s.ticker)).length;
    if(uncatCount>0){
        const u=document.createElement("div");u.className="cat-nav"+(currentCategory==="__uncat__"?" active":"");
        u.onclick=()=>{currentCategory="__uncat__";currentTickerPage=null;renderSidebar();render();closeSidebar()};
        u.innerHTML=`<span class="cat-nav-icon">📌</span><div class="cat-nav-info"><div class="cat-nav-name">ללא קטגוריה</div><div class="cat-nav-count">${uncatCount}</div></div>`;
        list.appendChild(u);
    }
}

function toggleSidebar(){document.getElementById("sidebar").classList.toggle("mobile-on");document.getElementById("mobile-overlay").classList.toggle("on")}
function closeSidebar(){document.getElementById("sidebar").classList.remove("mobile-on");document.getElementById("mobile-overlay").classList.remove("on")}

function setFilter(f,el){currentFilter=f;document.querySelectorAll(".fbtn").forEach(b=>b.classList.remove("active"));el.classList.add("active");render()}
function goHome(){currentTickerPage=null;document.getElementById("ticker-page").classList.remove("on");document.getElementById("cat-view").style.display="";render();closeSidebar()}

function render(){
    if(!DATA)return;document.getElementById("loading").style.display="none";
    const m=DATA.meta||{};const s=m.market_status||"unknown";
    const sMap={open:"שוק פתוח",closed:"שוק סגור",pre_market:"טרום מסחר",after_hours:"אחרי שעות",weekend:"סופ\"ש"};
    document.getElementById("status").innerHTML='<span class="badge '+s+'">'+(sMap[s]||s)+'</span>';
    if(m.generated_at)document.getElementById("ts-info").textContent=new Date(m.generated_at).toLocaleString("he-IL");
    if(m.total_tickers)document.getElementById("scan-info").textContent=m.total_tickers+" מניות";
    document.getElementById("infobar").classList.add("on");
    const ft=document.getElementById("footer");ft.style.display="block";ft.textContent="CATALYST // "+(m.total_tickers||"?")+" stocks / v"+(m.pipeline_version||"3");

    if(currentTickerPage)return;
    document.getElementById("cat-view").style.display="";document.getElementById("ticker-page").classList.remove("on");

    let stocks=DATA.stocks||[];const cats=getCategories();
    if(currentCategory==="__all__"){document.getElementById("cat-icon").textContent="📋";document.getElementById("cat-title").textContent="כל המניות"}
    else if(currentCategory==="__uncat__"){document.getElementById("cat-icon").textContent="📌";document.getElementById("cat-title").textContent="ללא קטגוריה";stocks=stocks.filter(s=>!getTickerCategory(s.ticker))}
    else{const cat=cats.find(c=>c.id===currentCategory);if(cat){document.getElementById("cat-icon").textContent=cat.icon;document.getElementById("cat-title").textContent=cat.name;const ct=getCategoryTickers(cat.id);stocks=stocks.filter(s=>ct.includes(s.ticker))}}

    if(currentFilter==="bullish")stocks=stocks.filter(s=>s.direction==="bullish");
    else if(currentFilter==="bearish")stocks=stocks.filter(s=>s.direction==="bearish");
    else if(currentFilter==="high")stocks=stocks.filter(s=>(s.confidence||0)>=70);
    else if(currentFilter==="us")stocks=stocks.filter(s=>(s.market||"US")==="US");
    else if(currentFilter==="il")stocks=stocks.filter(s=>(s.market||"US")==="IL");

    document.getElementById("cat-count").textContent=stocks.length+" מניות";
    const grid=document.getElementById("stock-grid");grid.innerHTML="";
    if(!stocks.length){grid.innerHTML='<div class="empty-state" style="grid-column:1/-1"><div style="font-size:28px;opacity:.3;margin-bottom:8px">—</div><div style="font-size:13px">אין תוצאות</div></div>';return}

    stocks.forEach(stock=>{
        const conf=stock.confidence||0;const cls=conf>=70?"hi":conf>=45?"mid":"lo";const dir=stock.direction||"neutral";const chg=stock.change_pct||0;const at=stock.analysis_type||"";
        const card=document.createElement("div");card.className="card "+dir;
        card.onclick=(e)=>{if(e.target.closest(".card-cat-btn"))return;openTickerPage(stock.ticker)};
        let badges="";if(at){badges=`<span class="card-badge ${at==="short"?"short":"long"}">${at==="short"?"⏱":"📅"}</span>`}
        card.innerHTML=`<div class="card-cat-assign"><button class="card-cat-btn" onclick="showCatAssign(event,'${stock.ticker}')">🏷</button></div>
            <div class="card-row1"><div class="card-left"><div class="card-ticker">${stock.ticker||"?"}</div><div><span class="card-price">$${(stock.price||0).toLocaleString()}</span> <span class="card-change ${chg>=0?"up":"down"}">${chg>=0?"+":""}${chg.toFixed(2)}%</span></div></div><div class="card-right"><div class="card-conf ${cls}">${conf}</div></div></div>
            <div class="card-row2"><span class="card-signal ${dir}">${stock.signal||""}</span><span class="card-co">${stock.company_name||""}</span>${badges?'<div class="card-badges">'+badges+'</div>':""}</div>
            <div class="card-bottom">${stock.bottom_line||""}</div>`;
        grid.appendChild(card);
    });
}

// ── Ticker Page ──
function openTickerPage(ticker){
    currentTickerPage=ticker;document.getElementById("cat-view").style.display="none";document.getElementById("ticker-page").classList.add("on");
    const stocks=(DATA?DATA.stocks:[]).filter(s=>s.ticker===ticker);
    const shortD=stocks.find(s=>s.analysis_type==="short")||stocks[0]||null;const longD=stocks.find(s=>s.analysis_type==="long")||null;
    const base=shortD||longD||{ticker,company_name:"",price:0,change_pct:0};const chg=base.change_pct||0;
    const custom=getCustomTickers();const isCustom=custom.some(ct=>ct.symbol===ticker);

    document.getElementById("tp-header").innerHTML=`<button class="tp-back" onclick="goHome()">← חזרה לרשימה</button>
        <div class="tp-top"><div class="tp-info"><div class="tp-ticker">${ticker}</div><div class="tp-name">${base.company_name||""}${base.sector?" // "+base.sector:""}</div>
        <div class="tp-price-row"><span class="tp-price">$${(base.price||0).toLocaleString()}</span><span class="tp-change ${chg>=0?"up":"down"}">${chg>=0?"+":""}${chg.toFixed(2)}%</span></div></div>
        <div class="tp-actions">${isCustom?'<button class="tp-remove" onclick="removeCustomTicker(\''+ticker+'\')">הסר ממעקב</button>':""}</div></div>`;

    const hasShort=!!shortD&&shortD.signal&&shortD.signal!=="סורק...";const hasLong=!!longD&&longD.signal&&longD.signal!=="סורק...";
    currentTickerTab=hasShort?"short":"long";
    renderTickerTabs(ticker,hasShort,hasLong);renderTickerBody(ticker);
}

function renderTickerTabs(ticker,hasShort,hasLong){
    document.getElementById("tp-tabs").innerHTML=`<button class="tp-tab ${currentTickerTab==="short"?"active":""}" onclick="switchTab('short')"><span class="tp-tab-icon">⏱</span> טווח קצר ${hasShort?"":"(ריק)"}</button><button class="tp-tab ${currentTickerTab==="long"?"active":""}" onclick="switchTab('long')"><span class="tp-tab-icon">📅</span> טווח ארוך ${hasLong?"":"(ריק)"}</button>`;
}
function switchTab(tab){
    currentTickerTab=tab;const ticker=currentTickerPage;const stocks=(DATA?DATA.stocks:[]).filter(s=>s.ticker===ticker);
    const hasShort=stocks.some(s=>s.analysis_type==="short"&&s.signal&&s.signal!=="סורק...");const hasLong=stocks.some(s=>s.analysis_type==="long"&&s.signal&&s.signal!=="סורק...");
    renderTickerTabs(ticker,hasShort,hasLong);renderTickerBody(ticker);
}

function renderTickerBody(ticker){
    const body=document.getElementById("tp-body");const stocks=(DATA?DATA.stocks:[]).filter(s=>s.ticker===ticker);
    const data=stocks.find(s=>s.analysis_type===currentTickerTab)||(currentTickerTab==="short"?stocks[0]:null);
    if(!data||!data.signal||data.signal==="סורק..."){
        const lbl=currentTickerTab==="short"?"טווח קצר":"טווח ארוך";
        body.innerHTML=`<div class="tp-empty"><div style="font-size:32px;opacity:.3;margin-bottom:12px">${currentTickerTab==="short"?"⏱":"📅"}</div><div style="font-size:14px;margin-bottom:16px">אין נתוני ניתוח ${lbl} עבור ${ticker}</div><button class="tp-scan-btn" onclick="runTickerScan('${ticker}','${currentTickerTab}',this)">סרוק עכשיו — ${lbl}</button></div>`;return;
    }
    const dir=data.direction||"neutral";const conf=data.confidence||0;const cls=conf>=70?"hi":conf>=45?"mid":"lo";let h="";
    h+=`<div class="tp-signal ${dir}">${data.signal}</div>`;
    h+=`<div class="tp-conf">ביטחון: <strong class="${cls}">${conf}</strong> / 100</div>`;
    h+=`<div style="margin-bottom:14px"><button class="tp-scan-btn" style="font-size:11px;padding:7px 16px" onclick="runTickerScan('${ticker}','${currentTickerTab}',this)">${currentTickerTab==="short"?"⏱ סריקה מחודשת — טווח קצר":"📅 סריקה מחודשת — טווח ארוך"}</button></div>`;
    if(data.bottom_line)h+=`<div class="tp-bl">${data.bottom_line}</div>`;
    if(data.buzz_alert)h+=`<div class="buzz-alert"><div class="buzz-alert-icon">⚠️</div><div class="buzz-alert-content"><div class="buzz-alert-t">התראת באז</div><div class="buzz-alert-b">${data.buzz_alert}</div></div></div>`;
    if(data.earnings_insight)h+=`<div class="tp-sec"><div class="tp-sec-t">דוח רבעוני אחרון</div><div class="tp-sec-b">${data.earnings_insight}</div></div>`;
    const catalysts=data.catalysts||[];
    if(catalysts.length){h+=`<div class="tp-sec"><div class="tp-sec-t">קטליזטורים</div>`;catalysts.forEach(c=>{const ic=c.impact==="חיובי"?"pos":c.impact==="שלילי"?"neg":"unk";h+=`<div class="cat-item ${ic}"><div class="cat-head"><span class="cat-title">${c.title||""}</span><span class="cat-type ${c.type||"business"}">${c.type||""}</span></div><div class="cat-desc">${c.description||""}</div><div class="cat-tf">${c.timeframe||""} // ${c.impact||""}</div></div>`});h+=`</div>`}
    const qs=data.questions||[];
    if(qs.length){h+=`<div class="tp-sec"><div class="tp-sec-t">שאלות מפתח</div>`;qs.forEach(q=>{const ic=q.implication==="חיובי"?"pos":q.implication==="שלילי"?"neg":"neut";h+=`<div class="qa" onclick="this.classList.toggle('open')"><div class="qa-q">${q.question||""}</div><div class="qa-a">${q.answer||""}<br><span class="qa-imp ${ic}">${q.implication||""}</span></div></div>`});h+=`</div>`}
    const sources=data.sources||[];
    if(sources.length){h+=`<div class="tp-sources"><div class="tp-sources-t">תימוכין ומקורות</div><ul class="tp-sources-list">`;sources.forEach(src=>{if(src.startsWith("http")){try{const u=new URL(src);const d=u.hostname.replace("www.","");const p=u.pathname.length>1?u.pathname.substring(0,30)+(u.pathname.length>30?"...":""):"";h+=`<li><a href="${src}" target="_blank" rel="noopener"><strong>${d}</strong>${p} ↗</a></li>`}catch(e){h+=`<li><a href="${src}" target="_blank" rel="noopener">${src.substring(0,60)}... ↗</a></li>`}}else{h+=`<li>${src}</li>`}});h+=`</ul></div>`}
    body.innerHTML=h;
}

async function runTickerScan(ticker,analysisType,btn){
    if(!confirm(`לסרוק את ${ticker} (${analysisType==="short"?"טווח קצר":"טווח ארוך"})?`))return;
    btn.disabled=true;btn.classList.add("running");btn.textContent="סורק...";
    try{await triggerWorkflow(ticker,analysisType);btn.textContent="הסריקה רצה! ~2 דקות";setTimeout(()=>location.reload(),120000)}catch(e){btn.textContent="שגיאה";btn.disabled=false;btn.classList.remove("running")}
}

function removeCustomTicker(ticker){
    const custom=getCustomTickers().filter(ct=>ct.symbol!==ticker);localStorage.setItem("custom_tickers",JSON.stringify(custom));
    const idx=WATCHLIST.indexOf(ticker);if(idx>-1)WATCHLIST.splice(idx,1);goHome();renderSidebar();render();
}

// ── Workflow ──
async function triggerWorkflow(ticker,analysisType){
    const btn=document.getElementById("run-btn");btn.textContent="SCANNING...";btn.classList.add("running");btn.disabled=true;
    try{const _e="d1NlUDUwMmdVMWptVkk5OHV2bFpOSmJjMHZkRnRteDJ2bDREX3BoZw==";const _d=atob(_e).split("").reverse().join("");
        const body={ref:"main",inputs:{analysis_type:analysisType||"short"}};if(ticker)body.inputs.ticker=ticker;
        const resp=await fetch("https://api.github.com/repos/itzhak-iab/CATALYST/actions/workflows/daily_matrix.yml/dispatches",{method:"POST",headers:{"Authorization":"token "+_d,"Accept":"application/vnd.github+json"},body:JSON.stringify(body)});
        if(resp.status===204||resp.ok){const w=ticker?2:4;btn.textContent="RUNNING ~"+w+"MIN";btn.classList.remove("running");setTimeout(()=>{btn.textContent="REFRESHING...";location.reload()},w*60*1000)}else throw new Error("Status "+resp.status);
    }catch(e){btn.textContent="ERROR";btn.classList.remove("running");btn.disabled=false;console.error("Trigger:",e)}
}

async function triggerDualScan(ticker){
    try{const _e="d1NlUDUwMmdVMWptVkk5OHV2bFpOSmJjMHZkRnRteDJ2bDREX3BoZw==";const _d=atob(_e).split("").reverse().join("");
        const headers={"Authorization":"token "+_d,"Accept":"application/vnd.github+json"};const url="https://api.github.com/repos/itzhak-iab/CATALYST/actions/workflows/daily_matrix.yml/dispatches";
        await fetch(url,{method:"POST",headers,body:JSON.stringify({ref:"main",inputs:{ticker,analysis_type:"short"}})});
        await new Promise(r=>setTimeout(r,2000));
        await fetch(url,{method:"POST",headers,body:JSON.stringify({ref:"main",inputs:{ticker,analysis_type:"long"}})});
        setTimeout(()=>location.reload(),180000);
    }catch(e){console.error("Dual scan:",e)}
}

// ── Category Assign ──
function showCatAssign(e,ticker){
    e.stopPropagation();const drop=document.getElementById("cat-assign-drop");const cats=getCategories();let h="";
    cats.forEach(c=>{const isIn=getCategoryTickers(c.id).includes(ticker);h+=`<div class="cad-item${isIn?" active":""}" onclick="toggleTickerCat('${ticker}','${c.id}')"><span style="font-size:14px;width:20px;text-align:center">${c.icon}</span><span style="flex:1">${c.name}</span><span class="cad-check${isIn?" on":""}">${isIn?"✓":""}</span></div>`});
    h+=`<div class="cad-sep"></div><div class="cad-item" onclick="clearTickerCat('${ticker}')"><span style="font-size:14px;width:20px;text-align:center">✖</span><span>ללא קטגוריה</span></div>`;
    drop.innerHTML=h;const rect=e.target.getBoundingClientRect();drop.style.top=rect.bottom+4+"px";drop.style.left=Math.max(8,rect.left-150)+"px";drop.classList.add("on");
    setTimeout(()=>{const cl=function handler(ev){if(!drop.contains(ev.target)){drop.classList.remove("on");document.removeEventListener("click",handler)}};document.addEventListener("click",cl)},10);
}
function toggleTickerCat(ticker,catId){const a=getTickerAssignments();if(a[ticker]===catId)delete a[ticker];else a[ticker]=catId;localStorage.setItem("catalyst_ticker_assign",JSON.stringify(a));document.getElementById("cat-assign-drop").classList.remove("on");renderSidebar();render()}
function clearTickerCat(ticker){const a=getTickerAssignments();delete a[ticker];localStorage.setItem("catalyst_ticker_assign",JSON.stringify(a));document.getElementById("cat-assign-drop").classList.remove("on");renderSidebar();render()}

    if(editId){const cat=cats.find(c=>c.id===editId);document.getElementById("cat-modal-title").textContent="עריכת קטגוריה";document.getElementById("cat-name-input").value=cat?cat.name:"";document.querySelectorAll(".cat-icon-opt").forEach(b=>b.classList.toggle("active",b.dataset.icon===(cat?cat.icon:"📊")))}
    else{document.getElementById("cat-modal-title").textContent="קטגוריה חדשה";document.getElementById("cat-name-input").value="";document.querySelectorAll(".cat-icon-opt").forEach(b=>b.classList.toggle("active",b.dataset.icon==="📊"))}

function confirmCategory(){
    const name=document.getElementById("cat-name-input").value.trim();if(!name){document.getElementById("cat-err").textContent="הזן שם קטגוריה";return}
    const icon=document.querySelector(".cat-icon-opt.active")?.dataset.icon||"📊";const cats=getCategories();

    else{cats.push({id:"custom_"+Date.now(),name,icon,tickers:[]})}
    saveCategories(cats);closeCategoryModal();renderSidebar();
}
function editCategory(id){showCategoryModal(id)}
function deleteCategory(id){if(!confirm("למחוק את הקטגוריה?"))return;let cats=getCategories().filter(c=>c.id!==id);saveCategories(cats);const a=getTickerAssignments();for(const k of Object.keys(a)){if(a[k]===id)delete a[k]}localStorage.setItem("catalyst_ticker_assign",JSON.stringify(a));if(currentCategory===id)currentCategory="__all__";renderSidebar();render()}

(function(){const inp=document.getElementById("add-ticker-input");if(!inp)return;
    inp.addEventListener("input",function(){acSel=-1;filterAC(this.value.trim())});
    inp.addEventListener("keydown",function(e){const list=document.getElementById("ac-list");const items=list.querySelectorAll(".ac-item");
        if(e.key==="ArrowDown"){e.preventDefault();acSel=Math.min(acSel+1,items.length-1);highlightAC(items)}
        else if(e.key==="ArrowUp"){e.preventDefault();acSel=Math.max(acSel-1,0);highlightAC(items)}
        else if(e.key==="Enter"&&acSel>=0&&items[acSel]){e.preventDefault();items[acSel].click()}
        else if(e.key==="Escape"){list.classList.remove("on")}});
    document.addEventListener("click",function(e){if(!e.target.closest(".ac-wrap"))document.getElementById("ac-list").classList.remove("on")});
})();

function filterAC(q){const list=document.getElementById("ac-list");if(!q){list.classList.remove("on");return}const u=q.toUpperCase();const l=q.toLowerCase();
    let m=TICKER_DB.filter(t=>t.s.toUpperCase().includes(u)||t.n.includes(q)||t.n.toLowerCase().includes(l));
    m.sort((a,b)=>{const ae=a.s.toUpperCase().startsWith(u)?0:1;const be=b.s.toUpperCase().startsWith(u)?0:1;if(ae!==be)return ae-be;return a.s.length-b.s.length});m=m.slice(0,10);
    if(!m.length){list.classList.remove("on");return}list.innerHTML="";
    m.forEach(t=>{const d=document.createElement("div");d.className="ac-item";d.innerHTML=`<span class="ac-sym">${t.s}</span><span class="ac-name">${t.m==="IL"?"🇮🇱":"🇺🇸"} ${t.n}</span>`;d.onclick=()=>selectAC(t);list.appendChild(d)});list.classList.add("on")}
function highlightAC(items){items.forEach((it,i)=>it.classList.toggle("sel",i===acSel));if(items[acSel])items[acSel].scrollIntoView({block:"nearest"})}
function selectAC(t){document.getElementById("add-ticker-input").value=t.s;document.getElementById("add-ticker-input").readOnly=true;document.getElementById("add-name-input").value=t.n;document.getElementById("name-group").style.display="block";document.getElementById("ac-list").classList.remove("on");selectedMarket=t.m;document.querySelectorAll(".m-market-btn").forEach(b=>b.classList.toggle("active",b.dataset.market===t.m))}

function confirmAddTicker(){
    const ticker=document.getElementById("add-ticker-input").value.trim().toUpperCase();const name=document.getElementById("add-name-input").value.trim();const errEl=document.getElementById("add-err");errEl.textContent="";
    if(!ticker||!name){errEl.textContent="בחר טיקר מהרשימה";return}
    const custom=getCustomTickers();if(custom.some(c=>c.symbol===ticker)||WATCHLIST.slice(0,15).includes(ticker)){errEl.textContent="טיקר זה כבר במעקב";return}
    custom.push({symbol:ticker,name,market:selectedMarket});localStorage.setItem("custom_tickers",JSON.stringify(custom));
    if(!WATCHLIST.includes(ticker))WATCHLIST.push(ticker);closeAddTickerModal();
    const ph={ticker,company_name:name,sector:"",signal:"סורק...",direction:"neutral",confidence:0,price:0,change_pct:0,bottom_line:"סריקה ראשונית בתהליך...",analysis_type:"",market:selectedMarket,catalysts:[],questions:[],sources:[]};
    if(!DATA)DATA={stocks:[],meta:{}};DATA.stocks.push(ph);renderSidebar();render();triggerDualScan(ticker);
}

document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeRunModal();closeAddTickerModal();closeCategoryModal();document.getElementById("cat-assign-drop").classList.remove("on")}});
